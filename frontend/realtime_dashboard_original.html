<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real-time Dashboard - Retail Forecasting</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0ea5e9" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .slide-in { animation: slideIn 0.3s ease-out; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .pulse-slow { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <!-- Header -->
  <header class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-4">
          <button onclick="history.back()" class="text-sky-600 hover:text-sky-800 transition">
            <i class="fas fa-arrow-left mr-2"></i>Back
          </button>
          <h1 class="text-2xl font-bold text-slate-900">Real-time Dashboard</h1>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-sm text-slate-500">Last updated:</span>
          <span id="lastUpdated" class="text-sm font-medium text-sky-600">--</span>
          <button onclick="refreshData()" class="px-4 py-2 bg-sky-600 text-white rounded-lg hover:bg-sky-700 transition">
            <i class="fas fa-sync-alt mr-2"></i>Refresh
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 py-6">
    <!-- KPI Cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
      <div class="bg-white rounded-xl shadow-sm p-6 card-hover">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-slate-500 mb-1">Today's Revenue</p>
            <p id="todayRevenue" class="text-3xl font-bold text-slate-900">₹0</p>
          </div>
          <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
            <i class="fas fa-rupee-sign text-green-600"></i>
          </div>
        </div>
      </div>
      
      <div class="bg-white rounded-xl shadow-sm p-6 card-hover">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-slate-500 mb-1">Today's Orders</p>
            <p id="todayOrders" class="text-3xl font-bold text-slate-900">0</p>
          </div>
          <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
            <i class="fas fa-shopping-cart text-blue-600"></i>
          </div>
        </div>
      </div>
      
      <div class="bg-white rounded-xl shadow-sm p-6 card-hover">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-slate-500 mb-1">Avg Order Value</p>
            <p id="avgOrderValue" class="text-3xl font-bold text-slate-900">₹0</p>
          </div>
          <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center">
            <i class="fas fa-chart-line text-purple-600"></i>
          </div>
        </div>
      </div>
      
      <div class="bg-white rounded-xl shadow-sm p-6 card-hover">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-slate-500 mb-1">Active Products</p>
            <p id="activeProducts" class="text-3xl font-bold text-slate-900">0</p>
          </div>
          <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center">
            <i class="fas fa-box text-orange-600"></i>
          </div>
        </div>
      </div>
    </div>

    <!-- Charts Row -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
      <!-- Revenue Chart -->
      <div class="bg-white rounded-xl shadow-sm p-6">
        <h2 class="text-lg font-semibold text-slate-900 mb-4">Revenue Trend</h2>
        <canvas id="revenueChart" width="400" height="200"></canvas>
      </div>
      
      <!-- Orders Chart -->
      <div class="bg-white rounded-xl shadow-sm p-6">
        <h2 class="text-lg font-semibold text-slate-900 mb-4">Orders Trend</h2>
        <canvas id="ordersChart" width="400" height="200"></canvas>
      </div>
    </div>

    <!-- Bottom Row -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- Live Feedback -->
      <div class="bg-white rounded-xl shadow-sm p-6">
        <h2 class="text-lg font-semibold text-slate-900 mb-4">Live Activity</h2>
        <div id="liveFeedback" class="space-y-3 max-h-96 overflow-y-auto">
          <div class="text-center text-slate-400 py-8">
            <i class="fas fa-inbox text-3xl mb-2"></i>
            <p class="text-sm">No recent activity</p>
          </div>
        </div>
      </div>
      
      <!-- Top Products -->
      <div class="bg-white rounded-xl shadow-sm p-6">
        <h2 class="text-lg font-semibold text-slate-900 mb-4">Top Products</h2>
        <div id="topProducts" class="space-y-3 max-h-96 overflow-y-auto">
          <div class="text-center text-slate-400 py-8">
            <i class="fas fa-box-open text-3xl mb-2"></i>
            <p class="text-sm">No sales data available</p>
          </div>
        </div>
      </div>
      
      <!-- Store Performance -->
      <div class="bg-white rounded-xl shadow-sm p-6">
        <h2 class="text-lg font-semibold text-slate-900 mb-4">Store Performance</h2>
        <div id="storePerformance" class="space-y-3">
          <div class="text-center text-slate-400 py-8">
            <i class="fas fa-store text-3xl mb-2"></i>
            <p class="text-sm">No performance data available</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    // API Configuration
    const API_BASE = 'http://localhost:8000';
    
    // Chart instances
    let revenueChart = null;
    let ordersChart = null;
    
    // Initialize dashboard
    document.addEventListener('DOMContentLoaded', function() {
      initializeCharts();
      loadDashboardData();
      // Auto-refresh every 30 seconds
      setInterval(loadDashboardData, 30000);
    });
    
    // Initialize charts
    function initializeCharts() {
      const revenueCtx = document.getElementById('revenueChart').getContext('2d');
      const ordersCtx = document.getElementById('ordersChart').getContext('2d');
      
      revenueChart = new Chart(revenueCtx, {
        type: 'line',
        data: {
          labels: [],
          datasets: [{
            label: 'Revenue',
            data: [],
            borderColor: 'rgb(59, 130, 246)',
            backgroundColor: 'rgba(59, 130, 246, 0.1)',
            tension: 0.4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: false
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                callback: function(value) {
                  return '₹' + value.toLocaleString('en-IN');
                }
              }
            }
          }
        }
      });
      
      ordersChart = new Chart(ordersCtx, {
        type: 'line',
        data: {
          labels: [],
          datasets: [{
            label: 'Orders',
            data: [],
            borderColor: 'rgb(34, 197, 94)',
            backgroundColor: 'rgba(34, 197, 94, 0.1)',
            tension: 0.4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: false
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                stepSize: 1
              }
            }
          }
        }
      });
    }
    
    // Load dashboard data
    async function loadDashboardData() {
      try {
        const response = await fetch(API_BASE + '/api/analytics/realtime/dashboard/simple');
        const result = await response.json();
        
        if (result.success && result.data) {
          updateKPIs(result.data);
          updateCharts(result.data);
          updateFeedbackStream(result.data.recent_activity || []);
          updateTopProducts(result.data.top_products || []);
          updateStorePerformance(result.data.store_performance || []);
          updateLastUpdated();
        }
      } catch (error) {
        console.error('Error loading dashboard data:', error);
      }
    }
    
    // Update KPI cards
    function updateKPIs(data) {
      const todayRevenue = data.sales_trend?.reduce((sum, item) => sum + (item.revenue || 0), 0) || 0;
      const todayOrders = data.sales_trend?.reduce((sum, item) => sum + (item.orders || 0), 0) || 0;
      const avgOrderValue = todayOrders > 0 ? todayRevenue / todayOrders : 0;
      const activeProducts = data.top_products?.length || 0;
      
      document.getElementById('todayRevenue').textContent = '₹' + todayRevenue.toLocaleString('en-IN', {maximumFractionDigits: 0});
      document.getElementById('todayOrders').textContent = todayOrders;
      document.getElementById('avgOrderValue').textContent = '₹' + avgOrderValue.toLocaleString('en-IN', {maximumFractionDigits: 0});
      document.getElementById('activeProducts').textContent = activeProducts;
    }
    
    // Update charts
    function updateCharts(data) {
      if (!data.sales_trend) return;
      
      const labels = data.sales_trend.map(item => item.date || item.hour || '');
      const revenue = data.sales_trend.map(item => item.revenue || 0);
      const orders = data.sales_trend.map(item => item.orders || 0);
      
      // Update revenue chart
      revenueChart.data.labels = labels.slice(-24);
      revenueChart.data.datasets[0].data = revenue.slice(-24);
      revenueChart.update();
      
      // Update orders chart
      ordersChart.data.labels = labels.slice(-24);
      ordersChart.data.datasets[0].data = orders.slice(-24);
      ordersChart.update();
    }
    
    // Update feedback stream
    function updateFeedbackStream(activities) {
      const container = document.getElementById('liveFeedback');
      if (!activities || activities.length === 0) {
        container.innerHTML = `
          <div class="text-center text-slate-400 py-8">
            <i class="fas fa-inbox text-3xl mb-2"></i>
            <p class="text-sm">No recent activity</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = activities.slice(0, 6).map(activity => {
        const type = activity.type || 'unknown';
        const name = activity.customer_name || activity.product_name || 'Unknown';
        const time = new Date(activity.timestamp).toLocaleString();
        
        let icon = 'fas fa-circle';
        let color = 'text-slate-500';
        
        if (type === 'order') {
          icon = 'fas fa-shopping-cart';
          color = 'text-blue-500';
        } else if (type === 'feedback') {
          icon = 'fas fa-comment';
          color = 'text-green-500';
        } else if (type === 'view') {
          icon = 'fas fa-eye';
          color = 'text-purple-500';
        }
        
        return `
          <div class="flex items-start gap-3 p-3 bg-slate-50 rounded-lg hover:bg-slate-100 transition">
            <i class="${icon} ${color} mt-1"></i>
            <div class="flex-1">
              <p class="text-sm font-medium text-slate-800">${name}</p>
              <p class="text-xs text-slate-500">${time}</p>
              ${activity.total ? `<p class="text-sm font-semibold text-green-600">₹${activity.total.toLocaleString('en-IN')}</p>` : ''}
              ${activity.rating ? `<p class="text-xs text-yellow-500">★ ${activity.rating}</p>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }
    
    // Update top products
    function updateTopProducts(products) {
      const container = document.getElementById('topProducts');
      if (!products || products.length === 0) {
        container.innerHTML = `
          <div class="text-center text-slate-400 py-8">
            <i class="fas fa-box-open text-3xl mb-2"></i>
            <p class="text-sm">No sales data available</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = products.slice(0, 5).map((product, index) => `
        <div class="flex items-center gap-3 p-3 bg-slate-50 rounded-lg hover:bg-slate-100 transition">
          <div class="flex-shrink-0 w-8 h-8 bg-gradient-to-br from-yellow-400 to-yellow-600 text-white rounded-full flex items-center justify-center font-bold text-sm">
            ${index + 1}
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-slate-800 truncate">${product.name || 'Unknown Product'}</p>
            <p class="text-xs text-slate-500">${product.quantity || 0} sold</p>
          </div>
          <div class="text-right">
            <p class="text-sm font-bold text-green-600">₹${(product.revenue || 0).toLocaleString('en-IN')}</p>
          </div>
        </div>
      `).join('');
    }
    
    // Update store performance
    function updateStorePerformance(stores) {
      const container = document.getElementById('storePerformance');
      if (!stores || stores.length === 0) {
        container.innerHTML = `
          <div class="text-center text-slate-400 py-8">
            <i class="fas fa-store text-3xl mb-2"></i>
            <p class="text-sm">No performance data available</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = stores.map(store => `
        <div class="bg-slate-50 rounded-lg p-4">
          <h3 class="font-medium text-slate-800 mb-2">${store.store_name || 'Main Store'}</h3>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <p class="text-xs text-slate-500">Orders</p>
              <p class="text-lg font-bold text-blue-600">${store.orders || 0}</p>
            </div>
            <div>
              <p class="text-xs text-slate-500">Revenue</p>
              <p class="text-lg font-bold text-green-600">₹${(store.revenue || 0).toLocaleString('en-IN')}</p>
            </div>
          </div>
        </div>
      `).join('');
    }
    
    // Update last updated time
    function updateLastUpdated() {
      const now = new Date();
      document.getElementById('lastUpdated').textContent = now.toLocaleTimeString();
    }
    
    // Refresh data manually
    function refreshData() {
      loadDashboardData();
    }
  </script>
</body>
</html>
