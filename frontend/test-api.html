<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>API Test Page</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/api-utils.js"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <div class="max-w-2xl mx-auto p-4">
    <header class="py-6">
      <h1 class="text-2xl font-bold text-sky-700">API Connection Test</h1>
      <p class="text-sm text-slate-600">Test all API endpoints to diagnose connection issues</p>
    </header>

    <main class="space-y-4">
      <div class="p-4 bg-white rounded-lg shadow">
        <h2 class="font-semibold mb-3">Backend Health Check</h2>
        <button onclick="testHealth()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded">
          Test Health Endpoint
        </button>
        <div id="healthResult" class="mt-3"></div>
      </div>

      <div class="p-4 bg-white rounded-lg shadow">
        <h2 class="font-semibold mb-3">Authentication Test</h2>
        <button onclick="testLogin()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded">
          Test Admin Login
        </button>
        <div id="loginResult" class="mt-3"></div>
      </div>

      <div class="p-4 bg-white rounded-lg shadow">
        <h2 class="font-semibold mb-3">Products API Test</h2>
        <button onclick="testProducts()" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded">
          Test Products List
        </button>
        <div id="productsResult" class="mt-3"></div>
      </div>

      <div class="p-4 bg-white rounded-lg shadow">
        <h2 class="font-semibold mb-3">Feedback API Test</h2>
        <button onclick="testFeedback()" class="bg-orange-600 hover:bg-orange-700 text-white px-4 py-2 rounded">
          Test Feedback Submit
        </button>
        <div id="feedbackResult" class="mt-3"></div>
      </div>

      <div class="p-4 bg-white rounded-lg shadow">
        <h2 class="font-semibold mb-3">Current Status</h2>
        <div id="statusInfo" class="text-sm space-y-1">
          <div>Backend URL: <code class="bg-gray-100 px-1 rounded">http://localhost:8000</code></div>
          <div>Token stored: <span id="tokenStatus">Checking...</span></div>
          <div>Browser: <span id="browserInfo">Loading...</span></div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const { safeApiCall, showError, showSuccess, TOKEN_KEY, isAuthenticated } = window.apiUtils;

    // Update status info
    document.getElementById('tokenStatus').textContent = isAuthenticated() ? 'Yes' : 'No';
    document.getElementById('browserInfo').textContent = navigator.userAgent.split(' ').slice(-2).join(' ');

    async function testHealth() {
      const result = document.getElementById('healthResult');
      result.innerHTML = '<div class="text-blue-600">Testing...</div>';
      
      const response = await safeApiCall('/api/health');
      
      if (response.success) {
        result.innerHTML = `
          <div class="p-3 bg-green-50 border border-green-200 rounded">
            <div class="text-green-800 font-medium">✅ Backend is running!</div>
            <div class="text-sm text-green-700 mt-1">Status: ${response.data.status}</div>
          </div>
        `;
      } else {
        result.innerHTML = `
          <div class="p-3 bg-red-50 border border-red-200 rounded">
            <div class="text-red-800 font-medium">❌ Backend connection failed</div>
            <div class="text-sm text-red-700 mt-1">${response.meta.error}</div>
          </div>
        `;
      }
    }

    async function testLogin() {
      const result = document.getElementById('loginResult');
      result.innerHTML = '<div class="text-blue-600">Testing login...</div>';
      
      const response = await safeApiCall('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: 'admin@example.com',
          password: 'password'
        })
      });
      
      if (response.success) {
        localStorage.setItem(TOKEN_KEY, response.data.token);
        result.innerHTML = `
          <div class="p-3 bg-green-50 border border-green-200 rounded">
            <div class="text-green-800 font-medium">✅ Login successful!</div>
            <div class="text-sm text-green-700 mt-1">User: ${response.data.user.email} (${response.data.user.role})</div>
          </div>
        `;
        document.getElementById('tokenStatus').textContent = 'Yes';
      } else {
        result.innerHTML = `
          <div class="p-3 bg-red-50 border border-red-200 rounded">
            <div class="text-red-800 font-medium">❌ Login failed</div>
            <div class="text-sm text-red-700 mt-1">${response.meta.error}</div>
          </div>
        `;
      }
    }

    async function testProducts() {
      const result = document.getElementById('productsResult');
      result.innerHTML = '<div class="text-blue-600">Testing products API...</div>';
      
      const response = await safeApiCall('/api/products');
      
      if (response.success) {
        result.innerHTML = `
          <div class="p-3 bg-green-50 border border-green-200 rounded">
            <div class="text-green-800 font-medium">✅ Products API working!</div>
            <div class="text-sm text-green-700 mt-1">Found ${response.data.length} products</div>
          </div>
        `;
      } else {
        result.innerHTML = `
          <div class="p-3 bg-red-50 border border-red-200 rounded">
            <div class="text-red-800 font-medium">❌ Products API failed</div>
            <div class="text-sm text-red-700 mt-1">${response.meta.error}</div>
          </div>
        `;
      }
    }

    async function testFeedback() {
      const result = document.getElementById('feedbackResult');
      result.innerHTML = '<div class="text-blue-600">Testing feedback API...</div>';
      
      const response = await safeApiCall('/api/feedback/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          rating: 5,
          message: 'Test feedback from API test page',
          category: 'general'
        })
      });
      
      if (response.success) {
        result.innerHTML = `
          <div class="p-3 bg-green-50 border border-green-200 rounded">
            <div class="text-green-800 font-medium">✅ Feedback API working!</div>
            <div class="text-sm text-green-700 mt-1">Feedback ID: ${response.data.id}</div>
          </div>
        `;
      } else {
        result.innerHTML = `
          <div class="p-3 bg-red-50 border border-red-200 rounded">
            <div class="text-red-800 font-medium">❌ Feedback API failed</div>
            <div class="text-sm text-red-700 mt-1">${response.meta.error}</div>
          </div>
        `;
      }
    }

    // Auto-run health check on page load
    window.addEventListener('load', () => {
      setTimeout(testHealth, 500);
    });
  </script>
</body>
</html>
