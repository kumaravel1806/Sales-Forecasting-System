<!DOCTYPE html>
<html>
<head>
    <title>Test Products Loading</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8">
    <h1 class="text-2xl font-bold mb-4">Products Loading Test</h1>
    
    <div class="space-y-4">
        <button onclick="testProductsAPI()" class="bg-blue-600 text-white px-4 py-2 rounded">
            Test Products API
        </button>
        
        <button onclick="loadProductsInShop()" class="bg-green-600 text-white px-4 py-2 rounded">
            Load Products (Shop Method)
        </button>
    </div>
    
    <div id="results" class="mt-6 p-4 bg-gray-100 rounded">
        <h2 class="font-bold">Results:</h2>
        <div id="output"></div>
    </div>
    
    <div id="products" class="mt-6 grid grid-cols-1 md:grid-cols-3 gap-4">
        <!-- Products will appear here -->
    </div>

    <script>
        const API_BASE = '';
        
        async function testProductsAPI() {
            const output = document.getElementById('output');
            output.innerHTML = 'Testing API...';
            
            try {
                console.log('Fetching from:', API_BASE + '/api/products/');
                
                const response = await fetch(API_BASE + '/api/products/');
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const result = await response.json();
                console.log('API Result:', result);
                
                output.innerHTML = `
                    <div>Status: ${response.status}</div>
                    <div>Success: ${result.success}</div>
                    <div>Products Count: ${result.data ? result.data.length : 0}</div>
                    <div>Raw Response: <pre>${JSON.stringify(result, null, 2)}</pre></div>
                `;
                
            } catch (error) {
                console.error('API Test Error:', error);
                output.innerHTML = `<div class="text-red-600">Error: ${error.message}</div>`;
            }
        }
        
        async function loadProductsInShop() {
            const output = document.getElementById('output');
            const productsContainer = document.getElementById('products');
            
            output.innerHTML = 'Loading products using shop method...';
            
            try {
                // Show loading state
                productsContainer.innerHTML = `
                    <div class="col-span-full text-center py-12">
                        <div class="text-6xl mb-4">🔄</div>
                        <h3 class="text-xl font-bold text-gray-900 mb-2">Loading Products...</h3>
                        <p class="text-gray-600">Please wait while we fetch the latest products</p>
                    </div>
                `;
                
                // Fetch products from API
                const response = await fetch(API_BASE + '/api/products/');
                console.log('Products API response status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const result = await response.json();
                console.log('Products API result:', result);
                
                if (result.success && result.data && result.data.length > 0) {
                    // Display products
                    productsContainer.innerHTML = result.data.map(product => `
                        <div class="bg-white border border-gray-200 rounded-lg shadow-sm hover:shadow-md transition-shadow p-4">
                            <div class="aspect-square bg-gradient-to-br from-blue-100 to-purple-100 rounded-lg mb-4 flex items-center justify-center">
                                <span class="text-4xl">${getCategoryIcon(product.category)}</span>
                            </div>
                            <div class="space-y-2">
                                <h3 class="font-semibold text-gray-900 text-lg">${product.name}</h3>
                                <p class="text-sm text-gray-600">Category: ${product.category}</p>
                                <p class="text-sm text-gray-500">SKU: ${product.sku || 'N/A'}</p>
                                <div class="flex items-center justify-between">
                                    <span class="text-2xl font-bold text-green-600">₹${parseFloat(product.price).toFixed(2)}</span>
                                    <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition-colors">
                                        🛒 Add to Cart
                                    </button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                    
                    output.innerHTML = `<div class="text-green-600">SUCCESS: Loaded ${result.data.length} products!</div>`;
                } else {
                    // No products found
                    productsContainer.innerHTML = `
                        <div class="col-span-full text-center py-12">
                            <div class="text-6xl mb-4">📦</div>
                            <h3 class="text-xl font-bold text-gray-900 mb-2">No Products Available</h3>
                            <p class="text-gray-600">Products will appear here once they are added by the admin</p>
                        </div>
                    `;
                    output.innerHTML = `<div class="text-yellow-600">No products found in response</div>`;
                }
            } catch (error) {
                console.error('Error loading products:', error);
                output.innerHTML = `<div class="text-red-600">Error: ${error.message}</div>`;
                
                // Show error state
                productsContainer.innerHTML = `
                    <div class="col-span-full text-center py-12">
                        <div class="text-6xl mb-4">❌</div>
                        <h3 class="text-xl font-bold text-red-600 mb-2">Failed to Load Products</h3>
                        <p class="text-gray-600 mb-4">Error: ${error.message}</p>
                    </div>
                `;
            }
        }
        
        // Get category icon
        function getCategoryIcon(category) {
            const icons = {
                'Electronics': '📱',
                'Clothing': '👕',
                'Food': '🍎',
                'Medicine': '💊',
                'Cosmetics': '💄',
                'Books': '📚',
                'Sports': '⚽',
                'Home': '🏠',
                'Appliances': '🔌',
                'General': '📦'
            };
            return icons[category] || '📦';
        }
        
        // Auto-test on page load
        window.addEventListener('load', () => {
            console.log('Page loaded, testing API...');
            testProductsAPI();
        });
    </script>
</body>
</html>
