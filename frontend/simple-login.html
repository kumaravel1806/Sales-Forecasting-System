<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simple Login - GUARANTEED TO WORK</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <div class="max-w-md mx-auto p-4 mt-20">
    <div class="bg-white rounded-lg shadow p-6">
      <h1 class="text-2xl font-bold text-center mb-6">🔐 Simple Login</h1>
      
      <!-- Admin Quick Login -->
      <div class="mb-6 p-4 bg-blue-50 rounded">
        <h2 class="font-bold text-blue-800 mb-2">Quick Admin Access</h2>
        <button onclick="quickAdminLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded">
          Login as Admin (One Click)
        </button>
        <div id="quickResult" class="mt-2 text-sm"></div>
      </div>
      
      <!-- Manual Login Form -->
      <form onsubmit="manualLogin(event)" class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1">Email</label>
          <input id="email" type="email" value="admin@example.com" class="w-full border rounded p-2" required />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Password</label>
          <input id="password" type="password" value="password" class="w-full border rounded p-2" required />
        </div>
        <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded">
          Manual Login
        </button>
      </form>
      
      <div id="result" class="mt-4 text-sm"></div>
      
      <!-- Debug Info -->
      <div class="mt-6 p-3 bg-gray-100 rounded text-xs">
        <div><strong>Backend URL:</strong> <span id="backendUrl">Loading...</span></div>
        <div><strong>Current URL:</strong> <span id="currentUrl">Loading...</span></div>
        <div><strong>Token Stored:</strong> <span id="tokenStored">Loading...</span></div>
      </div>
      
      <!-- Navigation -->
      <div class="mt-4 text-center space-x-4">
        <a href="/" class="text-blue-600 hover:underline">← Home</a>
        <a href="/admin_dashboard.html" class="text-blue-600 hover:underline">Admin Dashboard</a>
        <a href="/shop.html" class="text-blue-600 hover:underline">Shop</a>
      </div>
    </div>
  </div>

  <script>
    // Simple, direct approach - no external dependencies
    const API_BASE = window.location.origin.includes('localhost:5173') ? 'http://localhost:8000' : '';
    const TOKEN_KEY = 'retail_jwt';
    
    console.log('Simple login page loaded');
    console.log('API_BASE:', API_BASE);
    
    // Update debug info
    document.getElementById('backendUrl').textContent = API_BASE || 'Same origin';
    document.getElementById('currentUrl').textContent = window.location.href;
    updateTokenStatus();
    
    function updateTokenStatus() {
      const token = localStorage.getItem(TOKEN_KEY);
      document.getElementById('tokenStored').textContent = token ? 'Yes' : 'No';
    }
    
    // Quick admin login - absolutely simple
    async function quickAdminLogin() {
      const resultDiv = document.getElementById('quickResult');
      resultDiv.innerHTML = '<span style="color: blue;">🔄 Logging in...</span>';
      
      console.log('Starting quick admin login...');
      
      try {
        const response = await fetch(API_BASE + '/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            email: 'admin@example.com',
            password: 'password'
          })
        });
        
        console.log('Login response status:', response.status);
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const data = await response.json();
        console.log('Login response data:', data);
        
        if (data.success && data.data && data.data.token) {
          // Store token
          localStorage.setItem(TOKEN_KEY, data.data.token);
          console.log('Token stored successfully');
          
          resultDiv.innerHTML = '<span style="color: green;">✅ Success! Redirecting...</span>';
          updateTokenStatus();
          
          // Force redirect with multiple methods
          console.log('Attempting redirect to admin dashboard...');
          
          // Method 1: Direct assignment
          setTimeout(() => {
            window.location.href = '/admin_dashboard.html';
          }, 500);
          
          // Method 2: Replace (backup)
          setTimeout(() => {
            window.location.replace('/admin_dashboard.html');
          }, 1000);
          
          // Method 3: Assign (backup)
          setTimeout(() => {
            window.location.assign('/admin_dashboard.html');
          }, 1500);
          
        } else {
          throw new Error(data.meta?.error || 'Login failed - no token received');
        }
        
      } catch (error) {
        console.error('Quick login error:', error);
        resultDiv.innerHTML = `<span style="color: red;">❌ Error: ${error.message}</span>`;
      }
    }
    
    // Manual login
    async function manualLogin(event) {
      event.preventDefault();
      
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = '<span style="color: blue;">🔄 Logging in...</span>';
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      console.log('Manual login attempt:', email);
      
      try {
        const response = await fetch(API_BASE + '/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            email: email,
            password: password
          })
        });
        
        console.log('Manual login response status:', response.status);
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const data = await response.json();
        console.log('Manual login response data:', data);
        
        if (data.success && data.data && data.data.token) {
          // Store token
          localStorage.setItem(TOKEN_KEY, data.data.token);
          console.log('Token stored successfully');
          
          resultDiv.innerHTML = '<span style="color: green;">✅ Login successful! Redirecting...</span>';
          updateTokenStatus();
          
          // Determine redirect based on role
          const role = data.data.user.role;
          const redirectUrl = role === 'admin' ? '/admin_dashboard.html' : '/shop.html';
          
          console.log('User role:', role);
          console.log('Redirecting to:', redirectUrl);
          
          // Force redirect
          setTimeout(() => {
            window.location.href = redirectUrl;
          }, 1000);
          
        } else {
          throw new Error(data.meta?.error || 'Login failed - no token received');
        }
        
      } catch (error) {
        console.error('Manual login error:', error);
        resultDiv.innerHTML = `<span style="color: red;">❌ Error: ${error.message}</span>`;
      }
    }
    
    // Test if we're already logged in
    window.addEventListener('load', async () => {
      const token = localStorage.getItem(TOKEN_KEY);
      if (token) {
        console.log('Token found, testing validity...');
        
        try {
          const response = await fetch(API_BASE + '/api/auth/me', {
            headers: {
              'Authorization': 'Bearer ' + token
            }
          });
          
          if (response.ok) {
            const data = await response.json();
            if (data.success) {
              console.log('Already logged in as:', data.data.email);
              document.getElementById('result').innerHTML = `<span style="color: green;">Already logged in as ${data.data.email}</span>`;
              
              // Auto-redirect if already logged in
              const role = data.data.role;
              const redirectUrl = role === 'admin' ? '/admin_dashboard.html' : '/shop.html';
              
              setTimeout(() => {
                console.log('Auto-redirecting to:', redirectUrl);
                window.location.href = redirectUrl;
              }, 2000);
            }
          }
        } catch (error) {
          console.log('Token validation failed:', error);
        }
      }
    });
  </script>
</body>
</html>
