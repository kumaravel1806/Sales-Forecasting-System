<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Assistant (Gemini)</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0ea5e9" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <div class="max-w-xl mx-auto p-4">
    <header class="py-6">
      <a href="/" class="text-sky-600 text-sm">← Home</a>
      <h1 class="text-2xl font-bold text-sky-700 mt-2">Retail Assistant</h1>
      <p class="text-sm text-slate-600">Backed by Google Gemini 2.0 (placeholder). Configure GEMINI_API_KEY to enable.</p>
    </header>

    <main class="space-y-4">
      <section class="p-4 bg-white rounded-lg shadow">
        <form id="chatForm" class="space-y-3">
          <textarea name="prompt" class="w-full border rounded p-2 h-28" placeholder="Ask about inventory, sales, or models..."></textarea>
          <button class="bg-sky-600 hover:bg-sky-700 text-white px-4 py-2 rounded">Send</button>
        </form>
      </section>

      <section class="p-4 bg-white rounded-lg shadow">
        <h2 class="font-semibold mb-2">Response</h2>
        <pre id="resp" class="text-sm bg-slate-100 p-2 rounded overflow-auto"></pre>
      </section>
    </main>
  </div>

  <script>
    document.getElementById('chatForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const prompt = fd.get('prompt');
      const res = await fetch('/api/assistant/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      });
      const j = await res.json().catch(()=>({success:false, meta:{error:'bad_json'}}));
      const out = j.success ? (j.data?.output ?? JSON.stringify(j.data, null, 2)) : `Error: ${j.meta?.error}`;
      document.getElementById('resp').textContent = out;
    });
  </script>
</body>
</html>
