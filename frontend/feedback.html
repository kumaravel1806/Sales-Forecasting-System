<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Feedback Trends</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0ea5e9" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <div class="max-w-5xl mx-auto p-4">
    <header class="py-6 flex items-center justify-between">
      <div>
        <a href="/" class="text-sky-600 text-sm">← Home</a>
        <h1 class="text-2xl font-bold text-sky-700 mt-2">Feedback Trends</h1>
        <p class="text-sm text-slate-600">Daily average ratings and status counts</p>
      </div>
    </header>

    <main class="space-y-6">
      <section class="p-4 bg-white rounded-lg shadow">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-3 items-end">
          <input id="store" placeholder="Store ID (optional)" class="border rounded p-2" />
          <button id="load" class="bg-sky-600 hover:bg-sky-700 text-white px-4 py-2 rounded">Load</button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
          <div>
            <h2 class="font-semibold mb-2">Average Rating</h2>
            <canvas id="ratingChart"></canvas>
          </div>
          <div>
            <h2 class="font-semibold mb-2">Status Counts</h2>
            <canvas id="statusChart"></canvas>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const API_BASE = location.origin.startsWith('http://localhost:5173') ? 'http://localhost:8000' : '';
    let ratingChart, statusChart;

    function drawCharts(ratings, status){
      const rCtx = document.getElementById('ratingChart');
      const sCtx = document.getElementById('statusChart');
      const labels = ratings.map(r => r.date);
      const avg = ratings.map(r => r.avg_rating ?? null);
      if (ratingChart) ratingChart.destroy();
      ratingChart = new Chart(rCtx, { type:'line', data:{ labels, datasets:[{ label:'Avg Rating', data: avg, borderColor:'#0ea5e9', backgroundColor:'rgba(14,165,233,0.2)'}] }, options:{ responsive:true } });

      const sLabels = status.map(s => s.date);
      const open = status.map(s => s.open);
      const answered = status.map(s => s.answered);
      const closed = status.map(s => s.closed);
      if (statusChart) statusChart.destroy();
      statusChart = new Chart(sCtx, { type:'bar', data:{ labels: sLabels, datasets:[
        { label:'Open', data: open, backgroundColor:'#f59e0b' },
        { label:'Answered', data: answered, backgroundColor:'#10b981' },
        { label:'Closed', data: closed, backgroundColor:'#6366f1' },
      ] }, options:{ responsive:true, plugins:{ legend:{ position:'bottom' } } } });
    }

    document.getElementById('load').addEventListener('click', async () => {
      const store = document.getElementById('store').value.trim();
      const url = store ? `${API_BASE}/api/feedback/trends?store_id=${encodeURIComponent(store)}` : `${API_BASE}/api/feedback/trends`;
      const j = await fetch(url).then(r=>r.json());
      if (!j.success) { alert('Failed: ' + (j.meta?.error||'unknown')); return; }
      drawCharts(j.data.ratings||[], j.data.status||[]);
    });
  </script>
</body>
</html>
