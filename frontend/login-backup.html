<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login / Register</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0ea5e9" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/api-utils.js"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <div class="max-w-md mx-auto p-4">
    <header class="py-6 text-center">
      <a href="/" class="text-sky-600 text-sm">← Home</a>
      <h1 class="text-2xl font-bold text-sky-700 mt-2">Login / Register</h1>
    </header>

    <main class="space-y-6">
      <section class="p-4 bg-white rounded-lg shadow">
        <h2 class="font-semibold mb-2">🆕 Create New Account</h2>
        <form id="regForm" class="space-y-3">
          <div>
            <label class="block text-sm font-medium mb-1">Full Name</label>
            <input name="username" placeholder="Enter your full name" class="w-full border rounded p-3 focus:ring-2 focus:ring-sky-500" required />
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Email Address</label>
            <input name="email" placeholder="Enter your email" type="email" class="w-full border rounded p-3 focus:ring-2 focus:ring-sky-500" required />
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Password</label>
            <input name="password" placeholder="Create a password" type="password" class="w-full border rounded p-3 focus:ring-2 focus:ring-sky-500" required />
          </div>
          <button type="submit" class="w-full bg-sky-600 hover:bg-sky-700 text-white px-4 py-3 rounded font-medium">
            🚀 Create Account
          </button>
        </form>
        <div id="regMsg" class="text-sm mt-3"></div>
      </section>

      <section class="p-4 bg-white rounded-lg shadow">
        <h2 class="font-semibold mb-2">🔐 Login to Your Account</h2>
        <form id="loginForm" class="space-y-3">
          <div>
            <label class="block text-sm font-medium mb-1">Email Address</label>
            <input name="email" placeholder="Enter your email" type="email" class="w-full border rounded p-3 focus:ring-2 focus:ring-emerald-500" required />
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Password</label>
            <input name="password" placeholder="Enter your password" type="password" class="w-full border rounded p-3 focus:ring-2 focus:ring-emerald-500" required />
          </div>
          <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-3 rounded font-medium">
            🚀 Login Now
          </button>
        </form>
        <div id="loginMsg" class="text-sm mt-3"></div>
        
        <!-- Quick Admin Login -->
        <div class="mt-4 p-3 bg-blue-50 rounded border">
          <div class="text-sm font-medium text-blue-800 mb-2">🔑 Quick Admin Access:</div>
          <button onclick="quickAdminLogin()" class="text-xs bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded">
            Login as Admin (admin@example.com)
          </button>
        </div>
      </section>

      <section class="p-4 bg-white rounded-lg shadow">
        <h2 class="font-semibold mb-2">Current User</h2>
        <button id="meBtn" class="bg-slate-700 hover:bg-slate-800 text-white px-3 py-1.5 rounded text-sm">Load /me</button>
        <pre id="meOut" class="text-xs bg-slate-100 p-2 rounded overflow-auto mt-2"></pre>
      </section>
    </main>
  </div>

  <script>
    // Direct approach - no dependencies on external utils
    const API_BASE = '';  // Use same origin since backend serves frontend
    const TOKEN_KEY = 'retail_jwt';
    
    console.log('Login page loaded');
    console.log('Current origin:', window.location.origin);
    console.log('API_BASE:', API_BASE || 'same origin');

    document.getElementById('regForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('regMsg');
      const submitBtn = e.target.querySelector('button[type="submit"]');
      
      // Show loading state
      submitBtn.disabled = true;
      submitBtn.innerHTML = '🔄 Creating Account...';
      msg.innerHTML = '<span class="text-blue-600">🔄 Creating your account...</span>';
      
      const fd = new FormData(e.target);
      const body = { 
        email: fd.get('email'), 
        username: fd.get('username'), 
        password: fd.get('password') 
      };
      
      try {
        const response = await fetch(API_BASE + '/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        
        let result;
        if (response.ok) {
          result = await response.json();
        } else {
          result = { success: false, meta: { error: `HTTP ${response.status}: ${response.statusText}` } };
        }
        
        if (result.success) {
          msg.innerHTML = '<span class="text-green-600">✅ Account created successfully! You can now log in.</span>';
          e.target.reset();
          
          // Auto-focus on login form
          document.querySelector('#loginForm input[name="email"]').value = body.email;
          document.querySelector('#loginForm input[name="email"]').focus();
          
        } else {
          throw new Error(result.meta?.error || 'Registration failed');
        }
        
      } catch (error) {
        console.error('Registration error:', error);
        msg.innerHTML = `<span class="text-red-600">❌ Error: ${error.message}</span>`;
      } finally {
        // Reset button
        submitBtn.disabled = false;
        submitBtn.innerHTML = '🚀 Create Account';
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('loginMsg');
      const submitBtn = e.target.querySelector('button[type="submit"]');
      
      // Show loading state
      submitBtn.disabled = true;
      submitBtn.innerHTML = '🔄 Signing in...';
      msg.innerHTML = '<span class="text-blue-600">🔄 Authenticating...</span>';
      
      const fd = new FormData(e.target);
      const body = { 
        email: fd.get('email'), 
        password: fd.get('password') 
      };
      
      try {
        console.log('Attempting login with API_BASE:', API_BASE);
        const response = await fetch(API_BASE + '/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        
        let result;
        if (response.ok) {
          result = await response.json();
        } else {
          result = { success: false, meta: { error: `HTTP ${response.status}: ${response.statusText}` } };
        }
        
        if (result.success && result.data && result.data.token) {
          // Store token
          localStorage.setItem(TOKEN_KEY, result.data.token);
          
          // Show success message
          msg.innerHTML = `<span class="text-green-600">✅ Login successful! Redirecting...</span>`;
          
          // Force redirect immediately
          const role = (result.data.user.role || '').toLowerCase();
          console.log('User role:', role);
          
          if (role === 'admin') {
            console.log('Redirecting to admin dashboard...');
            window.location.replace('/admin_dashboard.html');
          } else {
            console.log('Redirecting to shop...');
            window.location.replace('/shop.html');
          }
          
        } else {
          throw new Error(result.meta?.error || 'Login failed - no token received');
        }
        
      } catch (error) {
        console.error('Login error:', error);
        msg.innerHTML = `<span class="text-red-600">❌ Error: ${error.message}</span>`;
        
        // Reset button
        submitBtn.disabled = false;
        submitBtn.innerHTML = '🚀 Login Now';
      }
    });

    document.getElementById('meBtn').addEventListener('click', async () => {
      try {
        const token = localStorage.getItem(TOKEN_KEY);
        const response = await fetch(API_BASE + '/api/auth/me', {
          headers: token ? { 'Authorization': 'Bearer ' + token } : {}
        });
        const result = await response.json();
        document.getElementById('meOut').textContent = JSON.stringify(result, null, 2);
      } catch (error) {
        document.getElementById('meOut').textContent = 'Error: ' + error.message;
      }
    });

    // Quick admin login function
    async function quickAdminLogin() {
      const msg = document.getElementById('loginMsg');
      msg.innerHTML = '<span class="text-blue-600">🔄 Logging in as admin...</span>';
      
      try {
        const response = await fetch(API_BASE + '/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: 'admin@example.com',
            password: 'password'
          })
        });
        
        let result;
        if (response.ok) {
          result = await response.json();
        } else {
          result = { success: false, meta: { error: `HTTP ${response.status}: ${response.statusText}` } };
        }
        
        if (result.success && result.data && result.data.token) {
          localStorage.setItem(TOKEN_KEY, result.data.token);
          msg.innerHTML = '<span class="text-green-600">✅ Admin login successful! Redirecting...</span>';
          
          // Force immediate redirect
          console.log('Quick admin login successful, redirecting...');
          window.location.replace('/admin_dashboard.html');
          
        } else {
          throw new Error(result.meta?.error || 'Admin login failed');
        }
        
      } catch (error) {
        console.error('Quick admin login error:', error);
        msg.innerHTML = `<span class="text-red-600">❌ Admin login failed: ${error.message}</span>`;
      }
    }
  </script>
</body>
</html>
