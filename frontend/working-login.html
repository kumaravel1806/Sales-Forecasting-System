<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RetailForecaster - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
  <div class="max-w-md mx-auto pt-20">
    <div class="bg-white rounded-xl shadow-lg p-8">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-blue-600">🚀 RetailForecaster</h1>
        <p class="text-gray-600 mt-2">AI-Powered Retail Analytics</p>
      </div>

      <!-- Quick Admin Login -->
      <div class="mb-6 p-4 bg-blue-50 rounded-lg">
        <h2 class="font-bold text-blue-800 mb-3">⚡ Quick Access</h2>
        <button onclick="adminLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white px-4 py-3 rounded-lg font-medium">
          🔑 Login as Admin
        </button>
        <div id="adminMsg" class="mt-2 text-sm"></div>
      </div>

      <!-- Manual Login -->
      <div class="space-y-4">
        <h2 class="font-bold text-gray-800">🔐 Manual Login</h2>
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input id="email" type="email" value="admin@example.com" 
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input id="password" type="password" value="password" 
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />
        </div>
        
        <button onclick="manualLogin()" class="w-full bg-green-600 hover:bg-green-700 text-white px-4 py-3 rounded-lg font-medium">
          🚀 Login
        </button>
        
        <div id="loginMsg" class="text-sm"></div>
      </div>

      <!-- Registration -->
      <div class="mt-8 pt-6 border-t border-gray-200">
        <h2 class="font-bold text-gray-800 mb-4">👤 Create Account</h2>
        
        <div class="space-y-3">
          <input id="regName" type="text" placeholder="Full Name" 
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500" />
          <input id="regEmail" type="email" placeholder="Email Address" 
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500" />
          <input id="regPassword" type="password" placeholder="Password" 
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500" />
          
          <button onclick="registerUser()" class="w-full bg-purple-600 hover:bg-purple-700 text-white px-4 py-3 rounded-lg font-medium">
            ✨ Create Account
          </button>
        </div>
        
        <div id="regMsg" class="mt-2 text-sm"></div>
      </div>

      <!-- Navigation -->
      <div class="mt-6 text-center">
        <a href="/" class="text-blue-600 hover:underline">← Back to Home</a>
      </div>
    </div>
  </div>

  <script>
    console.log('Working login page loaded');
    
    // Simple admin login
    async function adminLogin() {
      const msg = document.getElementById('adminMsg');
      msg.innerHTML = '<span class="text-blue-600">🔄 Logging in...</span>';
      
      try {
        console.log('Admin login attempt...');
        
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: 'admin@example.com',
            password: 'password'
          })
        });
        
        console.log('Response status:', response.status);
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        
        const data = await response.json();
        console.log('Login response:', data);
        
        if (data.success && data.data && data.data.token) {
          localStorage.setItem('retail_jwt', data.data.token);
          msg.innerHTML = '<span class="text-green-600">✅ Success! Redirecting...</span>';
          
          console.log('Redirecting to admin dashboard...');
          
          // Multiple redirect methods to ensure it works
          setTimeout(() => window.location.href = '/admin_dashboard.html', 500);
          setTimeout(() => window.location.replace('/admin_dashboard.html'), 1000);
          setTimeout(() => window.location.assign('/admin_dashboard.html'), 1500);
          
        } else {
          throw new Error(data.meta?.error || 'Login failed');
        }
        
      } catch (error) {
        console.error('Admin login error:', error);
        msg.innerHTML = `<span class="text-red-600">❌ ${error.message}</span>`;
      }
    }
    
    // Manual login
    async function manualLogin() {
      const msg = document.getElementById('loginMsg');
      msg.innerHTML = '<span class="text-blue-600">🔄 Logging in...</span>';
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        console.log('Manual login attempt:', email);
        
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        
        const data = await response.json();
        console.log('Manual login response:', data);
        
        if (data.success && data.data && data.data.token) {
          localStorage.setItem('retail_jwt', data.data.token);
          msg.innerHTML = '<span class="text-green-600">✅ Success! Redirecting...</span>';
          
          const redirectUrl = data.data.user.role === 'admin' ? '/admin_dashboard.html' : '/shop.html';
          console.log('Redirecting to:', redirectUrl);
          
          setTimeout(() => window.location.href = redirectUrl, 500);
          
        } else {
          throw new Error(data.meta?.error || 'Login failed');
        }
        
      } catch (error) {
        console.error('Manual login error:', error);
        msg.innerHTML = `<span class="text-red-600">❌ ${error.message}</span>`;
      }
    }
    
    // User registration
    async function registerUser() {
      const msg = document.getElementById('regMsg');
      msg.innerHTML = '<span class="text-blue-600">🔄 Creating account...</span>';
      
      const name = document.getElementById('regName').value;
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      
      if (!name || !email || !password) {
        msg.innerHTML = '<span class="text-red-600">❌ Please fill all fields</span>';
        return;
      }
      
      try {
        console.log('Registration attempt:', email);
        
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: name,
            email: email,
            password: password
          })
        });
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        
        const data = await response.json();
        console.log('Registration response:', data);
        
        if (data.success) {
          msg.innerHTML = '<span class="text-green-600">✅ Account created! You can now login.</span>';
          
          // Clear form and focus on login
          document.getElementById('regName').value = '';
          document.getElementById('regEmail').value = '';
          document.getElementById('regPassword').value = '';
          
          document.getElementById('email').value = email;
          document.getElementById('email').focus();
          
        } else {
          throw new Error(data.meta?.error || 'Registration failed');
        }
        
      } catch (error) {
        console.error('Registration error:', error);
        msg.innerHTML = `<span class="text-red-600">❌ ${error.message}</span>`;
      }
    }
    
    // Check if already logged in
    window.addEventListener('load', async () => {
      const token = localStorage.getItem('retail_jwt');
      if (token) {
        console.log('Token found, checking validity...');
        
        try {
          const response = await fetch('/api/auth/me', {
            headers: { 'Authorization': 'Bearer ' + token }
          });
          
          if (response.ok) {
            const data = await response.json();
            if (data.success) {
              console.log('Already logged in, redirecting...');
              const redirectUrl = data.data.role === 'admin' ? '/admin_dashboard.html' : '/shop.html';
              window.location.href = redirectUrl;
            }
          }
        } catch (error) {
          console.log('Token validation failed:', error);
        }
      }
    });
  </script>
</body>
</html>
