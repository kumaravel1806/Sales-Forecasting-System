<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Real-Time Analytics Dashboard - Retail Forecasting</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0ea5e9" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .slide-in { animation: slideIn 0.3s ease-out; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .pulse-slow { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); }
    
    /* Status badge styles */
    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .status-badge.success {
      background-color: #10b981;
      color: white;
    }
    .status-badge.failed {
      background-color: #ef4444;
      color: white;
    }
    .status-badge.responded {
      background-color: #3b82f6;
      color: white;
    }
    .status-badge.not-responded {
      background-color: #f59e0b;
      color: white;
    }
    .status-badge.viewed {
      background-color: #8b5cf6;
      color: white;
    }
    
    /* Feedback item styles */
    .feedback-item {
      padding: 12px;
      border-bottom: 1px solid #e5e7eb;
    }
    .feedback-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .customer-name {
      font-weight: 600;
      color: #1f2937;
    }
    .activity-type {
      font-size: 12px;
      color: #6b7280;
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .feedback-content {
      margin-left: 8px;
      font-size: 14px;
    }
    .amount {
      font-weight: 600;
      color: #059669;
    }
    .rating {
      color: #f59e0b;
      font-weight: 600;
    }
    .comment {
      color: #4b5563;
      margin: 4px 0 0 0;
      font-size: 13px;
    }
    .view-count {
      color: #8b5cf6;
      font-weight: 600;
    }
    .feedback-time {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 6px;
    }
    .no-activity {
      text-align: center;
      color: #9ca3af;
      padding: 20px;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <!-- Header -->
  <header class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-4">
          <a href="#" class="text-sky-600 hover:text-sky-800 transition flex items-center" onclick="window.location.href='/admin_dashboard.html'; return false;">
            <i class="fas fa-arrow-left mr-2"></i>Back to Dashboard
          </a>
          <h1 class="text-2xl font-bold text-slate-900">Real-time Dashboard</h1>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-sm text-slate-500">Last updated:</span>
          <span id="lastUpdated" class="text-sm font-medium text-sky-600">--</span>
          <button onclick="refreshData()" class="px-4 py-2 bg-sky-600 text-white rounded-lg hover:bg-sky-700 transition">
            <i class="fas fa-sync-alt mr-2"></i>Refresh
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 py-6">
    <!-- KPI Cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
      <div class="bg-white rounded-xl shadow-sm p-6 card-hover">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-slate-500 mb-1">Today's Revenue</p>
            <p id="todayRevenue" class="text-3xl font-bold text-slate-900">₹0</p>
          </div>
          <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
            <i class="fas fa-rupee-sign text-green-600"></i>
          </div>
        </div>
      </div>
      
      <div class="bg-white rounded-xl shadow-sm p-6 card-hover">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-slate-500 mb-1">Today's Orders</p>
            <p id="todayOrders" class="text-3xl font-bold text-slate-900">0</p>
          </div>
          <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
            <i class="fas fa-shopping-cart text-blue-600"></i>
          </div>
        </div>
      </div>
      
      <div class="bg-white rounded-xl shadow-sm p-6 card-hover">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-slate-500 mb-1">Average Order Value</p>
            <p id="avgOrderValue" class="text-3xl font-bold text-slate-900">₹0</p>
          </div>
          <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center">
            <i class="fas fa-chart-line text-purple-600"></i>
          </div>
        </div>
      </div>
      
      <div class="bg-white rounded-xl shadow-sm p-6 card-hover">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-slate-500 mb-1">Active Products</p>
            <p id="activeProducts" class="text-3xl font-bold text-slate-900">0</p>
          </div>
          <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center">
            <i class="fas fa-box text-orange-600"></i>
          </div>
        </div>
      </div>
    </div>

    <!-- Charts Row -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
      <!-- Revenue Chart -->
      <div class="bg-white rounded-xl shadow-sm p-4">
        <h2 class="text-sm font-semibold text-slate-900 mb-3">Revenue Trend</h2>
        <div class="h-48">
          <canvas id="revenueChart"></canvas>
        </div>
      </div>
      
      <!-- Orders Chart -->
      <div class="bg-white rounded-xl shadow-sm p-4">
        <h2 class="text-sm font-semibold text-slate-900 mb-3">Orders Trend</h2>
        <div class="h-48">
          <canvas id="ordersChart"></canvas>
        </div>
      </div>
    </div>

    <!-- Bottom Row -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
      <!-- Live Feedback -->
      <div class="bg-white rounded-xl shadow-sm p-4">
        <h2 class="text-sm font-semibold text-slate-900 mb-3">Live Activity</h2>
        <div id="liveFeedback" class="space-y-3 max-h-64 overflow-y-auto">
          <div class="text-center text-slate-400 py-8">
            <i class="fas fa-inbox text-3xl mb-2"></i>
            <p class="text-sm">Loading activity...</p>
          </div>
        </div>
      </div>
      
      <!-- Top Products -->
      <div class="bg-white rounded-xl shadow-sm p-4">
        <h2 class="text-sm font-semibold text-slate-900 mb-3">Top Products</h2>
        <div id="topProducts" class="space-y-3 max-h-64 overflow-y-auto">
          <div class="text-center text-slate-400 py-8">
            <i class="fas fa-box text-3xl mb-2"></i>
            <p class="text-sm">Loading products...</p>
          </div>
        </div>
      </div>
      
      <!-- Store Performance -->
      <div class="bg-white rounded-xl shadow-sm p-4">
        <h2 class="text-sm font-semibold text-slate-900 mb-3">Store Performance</h2>
        <div id="storePerformance" class="space-y-3 max-h-64 overflow-y-auto">
          <div class="text-center text-slate-400 py-8">
            <i class="fas fa-store text-3xl mb-2"></i>
            <p class="text-sm">Loading performance...</p>
          </div>
        </div>
      </div>
    </div>
  238→  </main>
  
  <script>
    // API configuration - supports Vite dev server on 5173 and backend on 8000/same origin
    const API_BASE = window.location.origin.includes('localhost:5173')
      ? 'http://localhost:8000'
      : '';
    
    // Chart instances
    let revenueChart = null;
    let ordersChart = null;
    
    // Initialize dashboard
    document.addEventListener('DOMContentLoaded', function() {
      initializeCharts();
      loadDashboardData();
      // Auto-refresh every 30 seconds
      setInterval(loadDashboardData, 30000);
    });
    
    // Initialize charts
    function initializeCharts() {
      const revenueCtx = document.getElementById('revenueChart').getContext('2d');
      const ordersCtx = document.getElementById('ordersChart').getContext('2d');
      
      revenueChart = new Chart(revenueCtx, {
        type: 'line',
        data: {
          labels: [],
          datasets: [{
            label: 'Revenue',
            data: [],
            borderColor: 'rgb(59, 130, 246)',
            backgroundColor: 'rgba(59, 130, 246, 0.1)',
            tension: 0.4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: false
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                callback: function(value) {
                  return '₹' + value.toLocaleString('en-IN');
                }
              }
            }
          }
        }
      });
      
      // Orders + Average order value chart with dual axes
      ordersChart = new Chart(ordersCtx, {
        type: 'line',
        data: {
          labels: [],
          datasets: [
            {
              label: 'Orders',
              data: [],
              borderColor: 'rgb(34, 197, 94)',
              backgroundColor: 'rgba(34, 197, 94, 0.1)',
              tension: 0.4,
              yAxisID: 'y'
            },
            {
              label: 'Avg Order Value',
              data: [],
              borderColor: 'rgb(168, 85, 247)',
              backgroundColor: 'rgba(168, 85, 247, 0.1)',
              tension: 0.4,
              yAxisID: 'y1'
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: true
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                stepSize: 1
              },
              position: 'left'
            },
            y1: {
              beginAtZero: true,
              position: 'right',
              grid: {
                drawOnChartArea: false
              },
              ticks: {
                callback: function(value) {
                  return '₹' + value.toLocaleString('en-IN');
                }
              }
            }
          }
        }
      });
    }
    
    // Load dashboard data from realtime analytics endpoint
    async function loadDashboardData() {
      try {
        const timestamp = new Date().getTime();
        const response = await fetch(API_BASE + '/api/analytics/dashboard/realtime?t=' + timestamp);
        const result = await response.json();
        
        if (!result.success) {
          console.error('Realtime dashboard API returned success=false', result);
          return;
        }
        
        const data = result.data || {};
        updateKPIs(data);
        updateCharts(data);
        updateFeedbackStream(data.recent_activity || []);
        updateTopProducts(data.top_products || []);
        updateStorePerformance(data.store_performance || []);
        updateLastUpdated();
      } catch (error) {
        console.error('Error loading dashboard data:', error);
      }
    }
    
    // Update KPI cards (today's revenue, orders, average order value, active products)
    function updateKPIs(data) {
      const kpi = data.kpi || {};
      
      const todayRevenue = kpi.today_revenue || 0;
      const todayOrders = kpi.today_orders || 0;
      const avgOrderValue = todayOrders > 0 ? todayRevenue / todayOrders : 0;
      
      const totalProducts = kpi.total_products || 0;
      const outOfStock = kpi.out_of_stock || 0;
      const activeProducts = Math.max(totalProducts - outOfStock, 0);
      
      document.getElementById('todayRevenue').textContent =
        '₹' + todayRevenue.toLocaleString('en-IN');
      document.getElementById('todayOrders').textContent =
        todayOrders.toLocaleString('en-IN');
      document.getElementById('avgOrderValue').textContent =
        '₹' + avgOrderValue.toLocaleString('en-IN', { maximumFractionDigits: 0 });
      document.getElementById('activeProducts').textContent =
        activeProducts.toLocaleString('en-IN');
    }
    
    // Update charts from sales_trend (hourly today)
    function updateCharts(data) {
      if (!data.sales_trend) return;
      
      const labels = data.sales_trend.map(item => item.date || item.hour || '');
      const revenue = data.sales_trend.map(item => item.revenue || 0);
      const orders = data.sales_trend.map(item => item.orders || 0);
      const avgOrderSeries = data.sales_trend.map(item => {
        if (item.avg_order_value != null) return item.avg_order_value;
        const ord = item.orders || 0;
        return ord > 0 ? (item.revenue || 0) / ord : 0;
      });
      
      const last = 24;
      const sliceFrom = labels.length > last ? labels.length - last : 0;
      
      const slicedLabels = labels.slice(sliceFrom);
      const slicedRevenue = revenue.slice(sliceFrom);
      const slicedOrders = orders.slice(sliceFrom);
      const slicedAvg = avgOrderSeries.slice(sliceFrom);
      
      revenueChart.data.labels = slicedLabels;
      revenueChart.data.datasets[0].data = slicedRevenue;
      revenueChart.update();
      
      ordersChart.data.labels = slicedLabels;
      ordersChart.data.datasets[0].data = slicedOrders;
      ordersChart.data.datasets[1].data = slicedAvg;
      ordersChart.update();
    }
    
    // Update live activity stream from recent_activity
    function updateFeedbackStream(activities) {
      const container = document.getElementById('liveFeedback');
      if (!activities || activities.length === 0) {
        container.innerHTML = `
          <div class="text-center text-slate-400 py-8">
            <i class="fas fa-inbox text-3xl mb-2"></i>
            <p class="text-sm">No recent activity</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = activities.slice(0, 6).map(activity => {
        const type = activity.type || 'order';
        const title = activity.description || activity.customer_name || activity.product_name || 'Activity';
        const time = activity.timestamp ? new Date(activity.timestamp).toLocaleString() : '';
        const amount = activity.amount != null ? activity.amount : activity.total;
        
        let icon = 'fas fa-circle';
        let color = 'text-slate-500';
        if (type === 'order') {
          icon = 'fas fa-shopping-cart';
          color = 'text-blue-500';
        } else if (type === 'feedback') {
          icon = 'fas fa-comment';
          color = 'text-green-500';
        } else if (type === 'view') {
          icon = 'fas fa-eye';
          color = 'text-purple-500';
        }
        
        return `
          <div class="flex items-start gap-3 p-3 bg-slate-50 rounded-lg hover:bg-slate-100 transition">
            <i class="${icon} ${color} mt-1"></i>
            <div class="flex-1">
              <p class="text-sm font-medium text-slate-800">${title}</p>
              <p class="text-xs text-slate-500">${time}</p>
              ${amount ? `<p class="text-sm font-semibold text-green-600">₹${(amount || 0).toLocaleString('en-IN')}</p>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }
    
    // Update top products card
    function updateTopProducts(products) {
      const container = document.getElementById('topProducts');
      if (!products || products.length === 0) {
        container.innerHTML = `
          <div class="text-center text-slate-400 py-8">
            <i class="fas fa-box-open text-3xl mb-2"></i>
            <p class="text-sm">No sales data available</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = products.slice(0, 5).map((product, index) => `
        <div class="flex items-center gap-3 p-3 bg-slate-50 rounded-lg hover:bg-slate-100 transition">
          <div class="flex-shrink-0 w-8 h-8 bg-gradient-to-br from-yellow-400 to-yellow-600 text-white rounded-full flex items-center justify-center font-bold text-sm">
            ${index + 1}
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-slate-800 truncate">${product.name || product.product_name || 'Unknown Product'}</p>
            <p class="text-xs text-slate-500">${product.sold_units || product.quantity || 0} sold</p>
          </div>
          <div class="text-right">
            <p class="text-sm font-bold text-green-600">₹${(product.revenue || 0).toLocaleString('en-IN')}</p>
          </div>
        </div>
      `).join('');
    }
    
    // Update store performance card
    function updateStorePerformance(stores) {
      const container = document.getElementById('storePerformance');
      if (!stores || stores.length === 0) {
        container.innerHTML = `
          <div class="text-center text-slate-400 py-8">
            <i class="fas fa-store text-3xl mb-2"></i>
            <p class="text-sm">No performance data available</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = stores.map(store => `
        <div class="bg-slate-50 rounded-lg p-4">
          <h3 class="font-medium text-slate-800 mb-2">${store.store_name || store.name || 'Main Store'}</h3>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <p class="text-xs text-slate-500">Orders</p>
              <p class="text-lg font-bold text-blue-600">${store.orders || 0}</p>
            </div>
            <div>
              <p class="text-xs text-slate-500">Revenue</p>
              <p class="text-lg font-bold text-green-600">₹${(store.revenue || 0).toLocaleString('en-IN')}</p>
            </div>
          </div>
        </div>
      `).join('');
    }
    
    // Update last updated time
    function updateLastUpdated() {
      const now = new Date();
      document.getElementById('lastUpdated').textContent = now.toLocaleTimeString();
    }
    
    // Manual refresh handler
    function refreshData() {
      loadDashboardData();
    }
  </script>
  </body>
  </html>
